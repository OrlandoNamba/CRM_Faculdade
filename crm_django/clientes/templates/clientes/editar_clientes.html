{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
    <h1 class="mb-4">Editar Cliente</h1>

    <form method="POST">
        {% csrf_token %}

        <div class="row">
            <div class="col-md-4">
                <label>Nome:</label>
                <input type="text" name="nome" value="{{ cliente.nome|default_if_none:'Não informado' }}" class="form-control">
            </div>

            <div class="col-md-4">
                <label>CPF:</label>
                <input type="text" value="{{ cliente.cpf }}" class="form-control" disabled>
            </div>

            <div class="col-md-4">
                <label>Cidade:</label>
                <input type="text" name="cidade" value="{{ cliente.cidade|default_if_none:'Não informado' }}" class="form-control">
            </div>
        </div>

        <br>

        <div class="row">
            <div class="col-md-4">
                <label>Telefone:</label>
                <input type="text" name="telefone" value="{{ cliente.telefone|default_if_none:'Não informado' }}" class="form-control">
            </div>

            <div class="col-md-4">
                <label>Telefone 2:</label>
                <input type="text" name="telefone2" value="{{ cliente.telefone2|default_if_none:'Não informado' }}" class="form-control">
            </div>

            <div class="col-md-4">
                <label>Telefone 3:</label>
                <input type="text" name="telefone3" value="{{ cliente.telefone3|default_if_none:'Não informado' }}" class="form-control">
            </div>
        </div>

        <br>

        <div class="row">
            <div class="col-md-4">
                <label>Renda:</label>
                <input type="number" step="0.01" name="renda" value="{{ cliente.renda|default_if_none:'Não informado' }}" class="form-control">
            </div>

            <div class="col-md-4">
                <label>Data de Nascimento:</label>
                <input type="date" name="data_nascimento" value="{{ cliente.data_nascimento|default_if_none:'Não informado' }}" class="form-control">
            </div>

            <div class="col-md-4">
                <label>CEP:</label>
                <input type="text" name="cep" value="{{ cliente.cep|default_if_none:'Não informado' }}" class="form-control">
            </div>
        </div>

        <br>

        <div class="row">
            <div class="col-md-4">
                <label>Logradouro:</label>
                <input type="text" name="logradouro" value="{{ cliente.logradouro|default_if_none:'Não informado' }}" class="form-control">
            </div>

            <div class="col-md-4">
                <label>Bairro:</label>
                <input type="text" name="bairro" value="{{ cliente.bairro|default_if_none:'Não informado' }}" class="form-control">
            </div>

            <div class="col-md-4">
                <label>Estado:</label>
                <input type="text" name="estado" value="{{ cliente.estado|default_if_none:'Não informado' }}" class="form-control">
            </div>
        </div>

        <br>

        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="/clientes/" class="btn btn-secondary">Voltar</a>

    </form>
</div>

{% endblock %}
