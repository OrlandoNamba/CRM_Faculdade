{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Cadastrar Cliente</h2>

<!-- IMPORTAR EXCEL -->
<div class="card mb-4">
    <div class="card-body">
        <h5 class="mb-3">Importar clientes por Excel</h5>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-8">
                    <input type="file" name="arquivo_excel" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary w-100">
                        Importar Excel
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- FORMULÁRIO CADASTRO -->
<div class="card">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Nome</label>
                    <input type="text" name="nome" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">CPF</label>
                    <input type="text" name="cpf" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Telefone</label>
                    <input type="text" name="telefone" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Telefone 2</label>
                    <input type="text" name="telefone2" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Telefone 3</label>
                    <input type="text" name="telefone3" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Renda</label>
                    <input type="text" name="renda" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Data de Nascimento</label>
                    <input type="date" name="data_nascimento" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">CEP</label>
                    <input type="text" name="cep" class="form-control">
                </div>

                <div class="col-md-12 mb-3">
                    <label class="form-label">Logradouro</label>
                    <input type="text" name="logradouro" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Bairro</label>
                    <input type="text" name="bairro" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Cidade</label>
                    <input type="text" name="cidade" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Estado</label>
                    <input type="text" name="estado" class="form-control">
                </div>

            </div>

            <button type="submit" class="btn btn-success">Cadastrar</button>
            <a href="/clientes/" class="btn btn-secondary">Voltar</a>

        </form>
    </div>
</div>

{% endblock %}
